<!DOCTYPE html>  <html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Admission Form Ticket</title>  
  <style>  
    body {  
      font-family: Arial, sans-serif;  
      display: flex;  
      justify-content: center;  
      align-items: flex-start;  
      min-height: 100vh;  
      margin: 0;  
      background-color: #f0f0f0;  
      padding: 20px;  
    }  
#app {  
  background-color: #fff;  
  padding: 30px;  
  border-radius: 10px;  
  box-shadow: 0 0 10px rgba(0,0,0,0.1);  
  width: 100%;  
  max-width: 400px;  
}  

h1 {  
  text-align: center;  
}  

label {  
  display: block;  
  margin: 15px 0 5px;  
}  

select, input[type="radio"] {  
  margin-right: 10px;  
}  

button {  
  margin-top: 20px;  
  width: 100%;  
  padding: 10px;  
  font-size: 16px;  
  cursor: pointer;  
  border: none;  
  background-color: #007bff;  
  color: white;  
  border-radius: 5px;  
}  

#ticketInfo {  
  margin-top: 20px;  
  padding: 15px;  
  background-color: #e9ffe9;  
  border: 1px solid #b2ffb2;  
  border-radius: 5px;  
  display: none;  
}

  </style>  
</head>  
<body>    <div id="app">  
    <h1>Admission Ticket</h1>  <!-- Form Section -->  
<form id="admissionForm">  
  <label>Status:</label>  
  <label><input type="radio" name="status" value="newcomer" required> Newcomer</label>  
  <label><input type="radio" name="status" value="old-timer" required> Old-timer</label>  

  <label for="classSelect">Select Class:</label>  
  <select id="classSelect" name="class" required>  
    <option value="">--Choose Class--</option>  
  <option value="Play Group">Play Group</option>
  <option value="Nursery">Nursery</option>
  <option value="KG-1 ">KG-1</option>
  <option value="KG-2">KG-2</option>
  <option value="class1">Class 1</option>
  <option value="class2">Class 2</option>
  <option value="class3">Class 3</option>
  <option value="class4">Class 4</option>
  <option value="class5">Class 5</option>
    <option value="class6">Class 6</option>  
    <option value="class7">Class 7</option>  
    <option value="class8">Class 8</option>
  <option value="class9">Class 9</option>
  <option value="class10">Class 10</option>
  <option value="class11">Class 11</option>
  <option value="class12">Class 12</option>  
  </select>  

  <button type="submit">Get Ticket</button>  
</form>  

<!-- Ticket Info Section -->  
<div id="ticketInfo"></div>

  </div>    <!-- App logic -->    <script src="app.js"></script>  </body>  
</html>
